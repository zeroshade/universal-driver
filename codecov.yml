codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true
    require_ci_to_pass: true

flags:
  rust-core:
    paths: ["sf_core/**"]
    carryforward: false
  python:
    paths: ["python/**"]
    carryforward: false
  jdbc:
    paths: ["jdbc/**"]
    carryforward: false
  odbc:
    paths: ["odbc/**"]
    carryforward: false



coverage:
  precision: 2
  round: down
  range: "60...90"
  
  status:
    project:
      default:
        target: auto
        threshold: 1%
        flags: [rust-core, python, jdbc, odbc]
        flag_coverage_not_uploaded_behavior: exclude
    patch: off

comment:
  layout: "header,diff,components,tree"
  behavior: default
  require_changes: false
  require_base: true
  require_head: true
  branches: ["main", "develop"]
  show_carryforward_flags: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 2%

  individual_components:
    - component_id: rust-core
      name: "Rust Core"
      paths:
        - "sf_core/**"
    - component_id: python
      name: "Python Driver"
      paths:
        - "python/**"
    - component_id: jdbc
      name: "JDBC Driver"
      paths:
        - "jdbc/**"
    - component_id: odbc
      name: "ODBC Driver"
      paths:
        - "odbc/**"

fixes:
  - "com/snowflake/::jdbc/src/java/com/snowflake/"

ignore:
  # Test files
  - "tests/**"
  - "**/tests/**"
  - "odbc_tests/**"
  - "jdbc/src/test/**"
  - "sf_core/tests/**"
  
  # Build artifacts
  - "**/target/"
  - "**/build/"
  
  # Generated code
  - "**/protobuf_gen/"
  - "**/gen-*/"
  
  # Configuration/documentation
  - "**/*.md"
  - "**/*.toml"
  - "**/*.lock"
  - "scripts/"

github_checks:
  annotations: true