repos:
-   repo: local
    hooks:
    -   id: rust-linting
        name: Rust formatting
        description: Run cargo fmt on files included in the commit. rustfmt should be installed before-hand.
        entry: cargo fmt --all --
        pass_filenames: true
        types: [file, rust]
        language: system
    -   id: rust-clippy
        name: Rust clippy
        description: Run cargo clippy on files included in the commit. clippy should be installed before-hand.
        entry: cargo clippy --all-targets --all-features -- -Dclippy::all
        pass_filenames: false
        types: [file, rust]
        language: system
    -   id: rust-cargo-check
        name: Rust cargo check
        description: Run cargo check on files included in the commit. cargo check should be installed before-hand.
        entry: cargo check --all-targets --all-features
        pass_filenames: false
        types: [file, rust]
        language: system
    -   id: clang-format
        name: clang-format
        description: Run clang-format on C/C++ files included in the commit. clang-format should be installed before-hand.
        entry: clang-format -i
        pass_filenames: true
        types_or: [c, c++]
        # to avoid huge diffs in case we need to upgrade nanoarrow
        exclude: ^python/src/snowflake/connector/_internal/nanoarrow_cpp/
        language: system
    -   id: tests-format-validator
        name: Tests format validator
        description: Validate that test implementations match Gherkin feature scenarios
        entry: ./tests/tests_format_validator/run_validator.sh
        pass_filenames: false
        language: system
    -   id: python-checks
        name: Python code checks (ruff + mypy)
        description: Run linting, formatting, and type checks on changed Python files
        entry: bash -c 'cd python && hatch run precommit:check'
        pass_filenames: true
        files: ^python/.*\.py$
        language: system
    -   id: uv-lock-update
        name: Update uv.lock
        description: Updates uv.lock file
        entry: bash -c 'cd python && uv lock'
        pass_filenames: false
        files: ^python/(pyproject\.toml|uv\.lock)$
        language: system
    -   id: python-no-assert-in-production
        name: No assert statements in production code
        description: Ensure no assert statements are used in python/src (production code only)
        entry: '^\s*assert\s'
        language: pygrep
        files: ^python/src/.*\.py$
    -   id: jdbc-spotless-check
        name: JDBC Spotless check
        description: Run Spotless checks for the JDBC module.
        entry: bash -c 'cd jdbc && bash ./gradlew spotlessCheck'
        pass_filenames: false
        files: ^jdbc/
        language: system
