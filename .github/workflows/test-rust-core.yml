name: Rust Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  merge_group:
    types: [ checks_requested ]

concurrency:
  # Group by PR number for PRs, or fall back to the run ID for main (which is unique, so it won't cancel)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  format:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_rust_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rustfmt
        run: rustup component add rustfmt && cargo fmt --version

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_rust_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-without-protobuf:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_rust_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sf_core without protobuf feature
        run: cargo build --package sf_core --no-default-features --features fips

  test:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_rust_core == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust-version: ['stable']
    runs-on: ${{ matrix.os }}
    env:
      E2E_TLS_SERVER: https://snowflakecomputing.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache tarpaulin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: tarpaulin-${{ runner.os }}

      - name: Install tarpaulin
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin
          fi

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}

      - name: Build sf_core with tarpaulin
        run: |
          export PARAMETER_PATH=$(pwd)/parameters.json
          cargo tarpaulin --packages sf_core --all-features --skip-clean --no-fail-fast --no-run --out lcov --output-dir .

      - name: Run tests with coverage
        run: |
          export PARAMETER_PATH=$(pwd)/parameters.json
          cargo tarpaulin --packages sf_core --all-features --skip-clean --no-fail-fast --out lcov --output-dir .
          mv lcov.info lcov-${{ matrix.os }}-${{ matrix.rust-version }}.info

  # Non-FIPS ARM64 build and test.
  # On windows-11-arm, --all-features fails for aarch64-pc-windows-msvc with:
  #   library machine type 'x64' conflicts with target machine type 'ARM64'
  # Evidence points to aws-lc-fips-sys Windows build env setup:
  # builder/printenv.bat calls vcvarsall.bat x64, overriding ARM64 toolchain env.
  # Workaround: do not enable fips on this lane.
  # Upstream issue: https://github.com/aws/aws-lc-rs/issues/1057
  # Repro job: https://github.com/snowflakedb/universal-driver/actions/runs/22779459689/job/66081199710
  # TODO: re-enable --all-features after fix.
  # The test suite is identical with and without fips — no tests are gated
  # behind cfg(feature = "fips"). Only the linked TLS crypto backend differs
  # (aws-lc-sys vs aws-lc-fips-sys).
  test_windows_arm64_nonfips:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_rust_core == 'true'
    runs-on: windows-11-arm
    name: test (Windows ARM64, non-FIPS)
    env:
      E2E_TLS_SERVER: https://snowflakecomputing.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust registry only
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-11-arm-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-11-arm-registry-

      - name: Install ARM64 OpenSSL via vcpkg
        shell: cmd
        run: |
          :: Build native ARM64 OpenSSL from source. The pre-installed OpenSSL is
          :: x64-only (no static libs, DLLs cause error 193 at runtime).
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" arm64
          vcpkg install openssl:arm64-windows

      - name: Configure OpenSSL
        shell: pwsh
        run: |
          echo "OPENSSL_DIR=C:\vcpkg\installed\arm64-windows" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\arm64-windows\lib" >> $env:GITHUB_ENV
          # Add vcpkg bin to PATH so ARM64 OpenSSL DLLs are found at runtime
          echo "C:\vcpkg\installed\arm64-windows\bin" >> $env:GITHUB_PATH

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        shell: bash

      - name: Build and test
        shell: cmd
        run: |
          :: Set up ARM64 MSVC environment
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" arm64
          set PARAMETER_PATH=${{ github.workspace }}\parameters.json

          :: Guard: verify MSVC env targets ARM64
          if not "%VSCMD_ARG_TGT_ARCH%"=="arm64" (
            echo ERROR: VSCMD_ARG_TGT_ARCH is '%VSCMD_ARG_TGT_ARCH%', expected 'arm64'
            exit /b 1
          )

          cargo build --package sf_core --target aarch64-pc-windows-msvc
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

          :: Guard: verify sf_core.dll is ARM64
          dumpbin /headers target\aarch64-pc-windows-msvc\debug\sf_core.dll | findstr "AA64" >nul
          if %ERRORLEVEL% neq 0 (
            echo ERROR: sf_core.dll is not ARM64
            dumpbin /headers target\aarch64-pc-windows-msvc\debug\sf_core.dll | findstr "machine"
            exit /b 1
          )

          :: Copy ARM64 OpenSSL DLLs next to test binaries so Windows finds them
          copy "C:\vcpkg\installed\arm64-windows\bin\libcrypto-3-arm64.dll" target\aarch64-pc-windows-msvc\debug\deps\ 2>nul
          copy "C:\vcpkg\installed\arm64-windows\bin\libssl-3-arm64.dll" target\aarch64-pc-windows-msvc\debug\deps\ 2>nul
          cargo test --package sf_core --target aarch64-pc-windows-msvc -- --nocapture

  rust-core-status:
    needs: [detect-changes, format, clippy, build-without-protobuf, test, test_windows_arm64_nonfips]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "=== Rust Core CI Status ==="
          
          # Check if tests were skipped
          if [[ "${{ needs.test.result }}" == "skipped" ]]; then
            echo "✓ Rust Core tests were SKIPPED (no relevant changes detected)"
            echo "  - run_rust_core: ${{ needs.detect-changes.outputs.run_rust_core }}"
            exit 0
          fi
          
          # Check if any job failed or was cancelled
          if [[ "${{ needs.format.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.clippy.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.build-without-protobuf.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.test.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.test_windows_arm64_nonfips.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "✗ Rust Core tests were RUN and FAILED or CANCELLED"
            echo "  - format: ${{ needs.format.result }}"
            echo "  - clippy: ${{ needs.clippy.result }}"
            echo "  - build-without-protobuf: ${{ needs.build-without-protobuf.result }}"
            echo "  - test: ${{ needs.test.result }}"
            echo "  - test_windows_arm64_nonfips: ${{ needs.test_windows_arm64_nonfips.result }}"
            exit 1
          fi
          
          # Tests ran and passed
          echo "✓ Rust Core tests were RUN and PASSED"
          exit 0
