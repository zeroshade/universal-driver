name: Detect Changes

on:
  workflow_call:
    outputs:
      # Raw detection outputs
      core:
        description: "True if core Rust code changed"
        value: ${{ jobs.detect.outputs.core }}
      jdbc:
        description: "True if JDBC wrapper code changed"
        value: ${{ jobs.detect.outputs.jdbc }}
      odbc:
        description: "True if ODBC wrapper code changed"
        value: ${{ jobs.detect.outputs.odbc }}
      python:
        description: "True if Python wrapper code changed"
        value: ${{ jobs.detect.outputs.python }}
      python_packaging:
        description: "True if Python packaging files changed"
        value: ${{ jobs.detect.outputs.python_packaging }}
      shared:
        description: "True if shared config/build files changed"
        value: ${{ jobs.detect.outputs.shared }}
      docs_only:
        description: "True if only documentation changed"
        value: ${{ jobs.detect.outputs.docs_only }}
      # "Should run" outputs — GHA always runs ALL unit tests; these flags
      # control whether to run at all (skip when only unrelated files changed).
      # Per-feature test selection is handled by Buildkite via ci/select_tests.py.
      run_jdbc:
        description: "True if JDBC tests should run"
        value: ${{ jobs.detect.outputs.run_jdbc }}
      run_odbc:
        description: "True if ODBC tests should run"
        value: ${{ jobs.detect.outputs.run_odbc }}
      run_python:
        description: "True if Python tests should run"
        value: ${{ jobs.detect.outputs.run_python }}
      run_python_packaging:
        description: "True if Python packaging tests should run"
        value: ${{ jobs.detect.outputs.run_python_packaging }}
      run_rust_core:
        description: "True if Rust Core tests should run"
        value: ${{ jobs.detect.outputs.run_rust_core }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      # Raw outputs
      core: ${{ steps.filter.outputs.core }}
      jdbc: ${{ steps.filter.outputs.jdbc }}
      odbc: ${{ steps.filter.outputs.odbc }}
      python: ${{ steps.filter.outputs.python }}
      python_packaging: ${{ steps.filter.outputs.python_packaging }}
      shared: ${{ steps.filter.outputs.shared }}
      docs_only: ${{ steps.computed.outputs.docs_only }}
      # Pre-computed "should run" outputs
      run_jdbc: ${{ steps.computed.outputs.run_jdbc }}
      run_odbc: ${{ steps.computed.outputs.run_odbc }}
      run_python: ${{ steps.computed.outputs.run_python }}
      run_python_packaging: ${{ steps.computed.outputs.run_python_packaging }}
      run_rust_core: ${{ steps.computed.outputs.run_rust_core }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for comparing commits

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'sf_core/**'
              - 'sf_mini_core/**'
              - 'sf_mini_core_static/**'
              - 'proto_utils/**'
              - 'proto_generator/**'
              - 'protobuf/**'
              - 'thrift/**'
            jdbc:
              - 'jdbc/**'
              - 'jdbc_bridge/**'
            odbc:
              - 'odbc/**'
              - 'odbc_tests/**'
            python:
              - 'python/**'
              - 'pep249_dbapi/**'
            python_packaging:
              - 'python/pyproject.toml'
              - 'python/hatch_build.py'
            shared:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build_common.rs'
              - 'rust-toolchain.toml'
              - 'error_trace/**'
              - 'error_trace_derive/**'
              - 'odbc_trace_tool/**'
              - 'tests/!(performance|tests_format_validator|test_coverage_report)/**'
              - '.github/workflows/**'
              - '.buildkite/**'
              - 'scripts/**'
              - 'ci/**'
            docs_only:
              - '**/*.md'
              - 'LICENSE'
              - '.github/CODEOWNERS'
              - '**/*.txt'
              - '!**/requirements.txt'
              - '!**/CMakeLists.txt'
              - '!**/*.yml'
              - '!**/*.yaml'

      - name: Compute combined conditions
        id: computed
        run: |
          # Docs only: true only if docs changed AND nothing else changed
          if [[ "${{ steps.filter.outputs.docs_only }}" == "true" ]] && \
             [[ "${{ steps.filter.outputs.core }}" == "false" ]] && \
             [[ "${{ steps.filter.outputs.jdbc }}" == "false" ]] && \
             [[ "${{ steps.filter.outputs.odbc }}" == "false" ]] && \
             [[ "${{ steps.filter.outputs.python }}" == "false" ]] && \
             [[ "${{ steps.filter.outputs.shared }}" == "false" ]]; then
            echo "docs_only=true" >> $GITHUB_OUTPUT
          else
            echo "docs_only=false" >> $GITHUB_OUTPUT
          fi

          # JDBC should run if: jdbc OR core OR shared changed
          if [[ "${{ steps.filter.outputs.jdbc }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.core }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            echo "run_jdbc=true" >> $GITHUB_OUTPUT
          else
            echo "run_jdbc=false" >> $GITHUB_OUTPUT
          fi

          # ODBC should run if: odbc OR core OR shared changed
          if [[ "${{ steps.filter.outputs.odbc }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.core }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            echo "run_odbc=true" >> $GITHUB_OUTPUT
          else
            echo "run_odbc=false" >> $GITHUB_OUTPUT
          fi

          # Python should run if: python OR core OR shared changed
          if [[ "${{ steps.filter.outputs.python }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.core }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            echo "run_python=true" >> $GITHUB_OUTPUT
          else
            echo "run_python=false" >> $GITHUB_OUTPUT
          fi

          # Packaging should run if: packaging files changed
          if [[ "${{ steps.filter.outputs.python_packaging }}" == "true" ]]; then
            echo "run_python_packaging=true" >> $GITHUB_OUTPUT
          else
            echo "run_python_packaging=false" >> $GITHUB_OUTPUT
          fi

          # Rust Core should run if: core OR shared changed
          if [[ "${{ steps.filter.outputs.core }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            echo "run_rust_core=true" >> $GITHUB_OUTPUT
          else
            echo "run_rust_core=false" >> $GITHUB_OUTPUT
          fi

      - name: Output summary
        run: |
          echo "### Change Detection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Files Changed" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Core | ${{ steps.filter.outputs.core }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JDBC | ${{ steps.filter.outputs.jdbc }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ODBC | ${{ steps.filter.outputs.odbc }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ steps.filter.outputs.python }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Packaging | ${{ steps.filter.outputs.python_packaging }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shared | ${{ steps.filter.outputs.shared }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Only | ${{ steps.computed.outputs.docs_only }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Tests to Run (GHA — all unit tests)" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Should Run |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Core | ${{ steps.computed.outputs.run_rust_core }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JDBC | ${{ steps.computed.outputs.run_jdbc }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ODBC | ${{ steps.computed.outputs.run_odbc }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ steps.computed.outputs.run_python }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Packaging | ${{ steps.computed.outputs.run_python_packaging }} |" >> $GITHUB_STEP_SUMMARY
