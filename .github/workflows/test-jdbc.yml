name: JDBC CI

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  jdbc_tests:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_jdbc == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java-version: ['8']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}

      - name: Build Rust components
        run: |
          cargo build --package sf_core
          cargo build --package jdbc_bridge

      - name: Make gradlew executable
        run: chmod +x jdbc/gradlew

      - name: Run JDBC tests
        run: |
          ls -l target/debug/
          export PARAMETER_PATH=$(pwd)/parameters.json
          export CORE_PATH=$(pwd)/target/debug/libjdbc_bridge.so
          cd jdbc
          ./gradlew test jacocoTestReport --stacktrace

  jdbc-status:
    needs: [detect-changes, jdbc_tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "=== JDBC CI Status ==="
          
          # Check if tests were skipped
          if [[ "${{ needs.jdbc_tests.result }}" == "skipped" ]]; then
            echo "✓ JDBC tests were SKIPPED (no relevant changes detected)"
            echo "  - run_jdbc: ${{ needs.detect-changes.outputs.run_jdbc }}"
            exit 0
          fi
          
          # Check if tests failed or were cancelled
          if [[ "${{ needs.jdbc_tests.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "✗ JDBC tests were RUN and FAILED or CANCELLED"
            exit 1
          fi
          
          # Tests ran and passed
          echo "✓ JDBC tests were RUN and PASSED"
          exit 0
