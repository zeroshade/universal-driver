name: JDBC CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  merge_group:
    types: [ checks_requested ]

concurrency:
  # Group by PR number for PRs, or fall back to the run ID for main (which is unique, so it won't cancel)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  jdbc_tests:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_jdbc == 'true'
    name: JDBC Tests (full suite)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java-version: ['8']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:

          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Rust target
        uses: actions/cache@v5
        with:

          path: target
          key: ${{ runner.os }}-rust-jdbc-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-jdbc-target-

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}

      - name: Build Rust components
        run: |
          cargo build --package sf_core
          cargo build --package jdbc_bridge

      - name: Make gradlew executable
        run: chmod +x jdbc/gradlew

      - name: Run JDBC tests
        run: |
          ls -l target/debug/
          export PARAMETER_PATH=$(pwd)/parameters.json
          export CORE_PATH=$(pwd)/target/debug/libjdbc_bridge.so
          cd jdbc
          ./gradlew test jacocoTestReport --stacktrace
        env:
          # In merge queue, retry each failing test up to 2 times (via Gradle Test Retry Plugin)
          GRADLE_TEST_RETRY_COUNT: ${{ github.event_name == 'merge_group' && '2' || '' }}

  jdbc_tests_reference:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_jdbc == 'true'
    name: JDBC Old Driver Reference Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}

      - name: Make gradlew executable
        run: chmod +x jdbc/gradlew

      - name: Run JDBC reference tests
        run: |
          export PARAMETER_PATH=$(pwd)/parameters.json
          cd jdbc
          ./gradlew referenceTest jacocoReferenceReport --stacktrace
        env:
          GRADLE_TEST_RETRY_COUNT: ${{ github.event_name == 'merge_group' && '2' || '' }}

      - name: Upload OLD reference artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jdbc-reference-artifacts
          path: |
            jdbc/build/test-results/referenceTest/**/*.xml
            jdbc/build/jacoco/referenceTest.exec
            jdbc/build/reports/jacoco/referenceTest/**
          if-no-files-found: error

      - name: Print OLD reference overall coverage
        if: always()
        run: |
          python3 jdbc/ci/reference_tests/extract_coverage.py \
            --report jdbc/build/reports/jacoco/referenceTest/coverage.xml \
            --label "OLD JDBC reference" \
            --summary "$GITHUB_STEP_SUMMARY" \
            --allow-missing

  jdbc-status:
    needs: [detect-changes, jdbc_tests, jdbc_tests_reference]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "=== JDBC CI Status ==="
          
          NEW_RESULT="${{ needs.jdbc_tests.result }}"
          REFERENCE_RESULT="${{ needs.jdbc_tests_reference.result }}"

          # Check if tests were skipped
          if [[ "$NEW_RESULT" == "skipped" && "$REFERENCE_RESULT" == "skipped" ]]; then
            echo "✓ JDBC jobs were SKIPPED (no relevant changes detected)"
            echo "  - run_jdbc: ${{ needs.detect-changes.outputs.run_jdbc }}"
            exit 0
          fi
          
          # Check if any job failed or was cancelled
          if [[ "$NEW_RESULT" =~ ^(failure|cancelled)$ || "$REFERENCE_RESULT" =~ ^(failure|cancelled)$ ]]; then
            echo "✗ JDBC CI FAILED or CANCELLED"
            echo "  - JDBC Tests (new): $NEW_RESULT"
            echo "  - JDBC Reference (old): $REFERENCE_RESULT"
            exit 1
          fi
          
          # Tests ran and passed
          echo "✓ JDBC jobs were RUN and PASSED"
          echo "  - JDBC Tests (new): $NEW_RESULT"
          echo "  - JDBC Reference (old): $REFERENCE_RESULT"
          exit 0
