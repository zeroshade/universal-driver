name: Validate generated data

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  # Group by PR number for PRs, or fall back to the run ID for main (which is unique, so it won't cancel)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  test-data:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.docs_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install brotli zstandard

      - name: Run all generator scripts
        run: |
          set -euo pipefail
          echo "Running generators in tests/test_data/test_data_generators -> tests/test_data/generated_test_data"
          for generator in tests/test_data/test_data_generators/*.py; do
            echo "Running generator"
            python "$generator" --out-dir tests/test_data/generated_test_data
          done

      - name: Check for uncommitted changes in generated test data
        run: |
          set -euo pipefail
          git status --porcelain=v1 -- tests/test_data/generated_test_data || true
          if [[ -n "$(git status --porcelain=v1 -- tests/test_data/generated_test_data)" ]]; then
            echo "Detected differences in tests/test_data/generated_test_data after regeneration." >&2
            echo "Please run the generator scripts locally and commit updated files." >&2
            echo
            git --no-pager diff -- tests/test_data/generated_test_data | sed -n '1,200p'
            exit 1
          fi
          echo "Generated test data matches repository."

  proto:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.docs_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate proto (Java only)
        run: |
          ./scripts/generate_proto.sh

      - name: Check Java proto files are up-to-date
        run: git diff --exit-code -- jdbc/

  tests-format-validator:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.docs_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests format validator
        run: |
          ./tests/tests_format_validator/run_validator.sh

  validations-status:
    needs: [detect-changes, test-data, proto, tests-format-validator]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "=== Validations Status ==="
          
          # Check if all validations were skipped (docs-only)
          if [[ "${{ needs.test-data.result }}" == "skipped" ]] && \
             [[ "${{ needs.proto.result }}" == "skipped" ]] && \
             [[ "${{ needs.tests-format-validator.result }}" == "skipped" ]]; then
            echo "✓ Validations were SKIPPED (documentation-only changes)"
            exit 0
          fi
          
          # Check if any validation failed or was cancelled
          if [[ "${{ needs.test-data.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.proto.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.tests-format-validator.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "✗ Validations were RUN and FAILED or CANCELLED"
            echo "  - test-data: ${{ needs.test-data.result }}"
            echo "  - proto: ${{ needs.proto.result }}"
            echo "  - tests-format-validator: ${{ needs.tests-format-validator.result }}"
            exit 1
          fi
          
          # Validations ran and passed
          echo "✓ Validations were RUN and PASSED"
          echo "  - test-data: ${{ needs.test-data.result }}"
          echo "  - proto: ${{ needs.proto.result }}"
          echo "  - tests-format-validator: ${{ needs.tests-format-validator.result }}"
          exit 0
