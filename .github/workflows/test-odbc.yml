name: ODBC CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    # Allow stacked PRs to trigger this workflow.
    # detect-changes still decides whether ODBC jobs actually run.
  merge_group:
    types: [ checks_requested ]

concurrency:
  # Group by PR number for PRs, or fall back to the run ID for main (which is unique, so it won't cancel)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  odbc_unit_tests:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_odbc == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Run ODBC unit tests
        # Workaround for Rust 1.89+ linker bug with dylib crates (rust-lang/rust#131292):
        # Rust passes --no-undefined-version to GNU ld with a version script that omits
        # allocator shim symbols, causing sf_core dylib builds to fail.
        id: run_odbc_unit_tests
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        run: cargo test --package odbc
        env:
          RUSTFLAGS: "-C link-arg=-Wl,--undefined-version"

      - name: Rerun ODBC unit tests
        if: steps.run_odbc_unit_tests.outcome == 'failure' && github.event_name == 'merge_group'
        run: cargo test --package odbc
        env:
          RUSTFLAGS: "-C link-arg=-Wl,--undefined-version"

  odbc_tests_reference:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            driver_lib: libsfodbc.so
          - os: windows-latest
            name: Windows x64
            driver_lib: sfodbc.dll
    runs-on: ${{ matrix.os }}
    name: odbc_reference_tests (${{ matrix.name }})
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_odbc == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-Checked([string]$commandName, [scriptblock]$command) {
            & $command
            if ($LASTEXITCODE -ne 0) { throw "$commandName failed with exit code $LASTEXITCODE" }
          }

          Invoke-Checked "pip install cmake" { pip install cmake>=4.0.3 }
          cmake --version

          Invoke-Checked "vcpkg install zlib:x64-windows" { vcpkg install zlib:x64-windows }

          $referenceOdbcVersion = (Get-Content "ci/reference-odbc-version" -Raw).Trim()
          $snowflakeOdbcMsi = "snowflake64_odbc-$referenceOdbcVersion.msi"
          $snowflakeOdbcUrl = "https://sfc-repo.snowflakecomputing.com/odbc/win64/$referenceOdbcVersion/$snowflakeOdbcMsi"
          Write-Host "Downloading Snowflake ODBC MSI from: $snowflakeOdbcUrl"
          Invoke-Checked "Invoke-WebRequest download Snowflake ODBC MSI" { Invoke-WebRequest -Uri $snowflakeOdbcUrl -OutFile $snowflakeOdbcMsi }
          $msiProcess = Start-Process -FilePath "msiexec" -ArgumentList "/i $snowflakeOdbcMsi /quiet" -Wait -PassThru
          if ($msiProcess.ExitCode -ne 0) { throw "msiexec failed with exit code $($msiProcess.ExitCode)" }

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y unixodbc unixodbc-dev curl odbcinst zlib1g-dev

          pip install cmake>=4.0.3
          cmake --version

          # Install reference ODBC driver
          REFERENCE_ODBC_VERSION=$(cat ci/reference-odbc-version | tr -d '[:space:]')
          . ci/reference-odbc-checksums
          echo "Installing reference ODBC driver version: $REFERENCE_ODBC_VERSION"
          DEB="snowflake-odbc-${REFERENCE_ODBC_VERSION}.x86_64.deb"
          curl -O "https://sfc-repo.snowflakecomputing.com/odbc/linux/${REFERENCE_ODBC_VERSION}/${DEB}"
          echo "${DEB_X86_64_SHA256}  ${DEB}" | sha256sum -c -
          sudo dpkg -i "${DEB}"
          sudo sed -i 's,ODBCInstLib=.*,ODBCInstLib=/usr/lib/x86_64-linux-gnu/libodbcinst.so.2,g' /usr/lib/snowflake/odbc/lib/simba.snowflake.ini

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        shell: bash

      - name: Run Old ODBC tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        id: run_odbc_ref_tests_linux
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        run: |
          export DRIVER_PATH=/usr/lib/snowflake/odbc/lib/libSnowflake.so
          export PARAMETER_PATH=$(pwd)/parameters.json
          cd odbc_tests/
          mkdir -p cmake-build
          cmake -B cmake-build \
              -D ODBC_LIBRARY="/usr/lib/x86_64-linux-gnu/libodbc.so" \
              -D ODBC_INCLUDE_DIR="/usr/include" \
              -D DRIVER_TYPE=OLD \
              .
          cmake --build cmake-build -- -j $(($(nproc) * 2))
          ctest -j $(($(nproc) * 4)) -C Debug --test-dir cmake-build --output-on-failure

      - name: Rerun failed Old ODBC tests (Linux)
        if: steps.run_odbc_ref_tests_linux.outcome == 'failure' && github.event_name == 'merge_group'
        run: ctest --rerun-failed -C Debug --test-dir odbc_tests/cmake-build --output-on-failure
        env:
          DRIVER_PATH: /usr/lib/snowflake/odbc/lib/libSnowflake.so
          PARAMETER_PATH: ${{ github.workspace }}/parameters.json
          DRIVER_TYPE: OLD

      - name: Run Old ODBC tests (Windows)
        if: matrix.os == 'windows-latest'
        id: run_odbc_ref_tests_windows
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        shell: pwsh
        run: |
          $env:DRIVER_PATH = "C:\Program Files\Snowflake ODBC Driver\Bin\SnowflakeDSII.dll"
          $env:PARAMETER_PATH = "$(pwd)\parameters.json"
          $env:DRIVER_TYPE = "OLD"
          .\scripts\odbc\run_tests_windows.ps1

      - name: Rerun failed Old ODBC tests (Windows)
        if: steps.run_odbc_ref_tests_windows.outcome == 'failure' && github.event_name == 'merge_group'
        shell: pwsh
        run: ctest --rerun-failed -C Debug --test-dir odbc_tests/cmake-build --output-on-failure
        env:
          DRIVER_PATH: C:\Program Files\Snowflake ODBC Driver\Bin\SnowflakeDSII.dll
          PARAMETER_PATH: ${{ github.workspace }}\parameters.json
          DRIVER_TYPE: OLD

  odbc_tests:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.run_odbc == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            driver_lib: libsfodbc.so
          - os: macos-latest
            name: macOS ARM64
            driver_lib: libsfodbc.dylib
          - os: windows-latest
            name: Windows x64
            driver_lib: sfodbc.dll
    runs-on: ${{ matrix.os }}
    name: odbc_tests (${{ matrix.name }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev build-essential zlib1g-dev
          wget https://github.com/Kitware/CMake/releases/download/v4.0.3/cmake-4.0.3-linux-x86_64.sh
          sudo sh cmake-4.0.3-linux-x86_64.sh --skip-license --prefix=/usr/local
          sudo rm cmake-4.0.3-linux-x86_64.sh
          cmake --version

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          # Go is required for building aws-lc-fips-sys (FIPS crypto)
          brew install unixodbc cmake go
          cmake --version
          go version
          # Export ODBC paths dynamically (works for both ARM64 and Intel Macs)
          echo "ODBC_PREFIX=$(brew --prefix unixodbc)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-Checked([string]$commandName, [scriptblock]$command) {
            & $command
            if ($LASTEXITCODE -ne 0) { throw "$commandName failed with exit code $LASTEXITCODE" }
          }

          Invoke-Checked "pip install cmake" { pip install cmake>=4.0.3 }
          cmake --version

          if (!(Test-Path "C:\Program Files\OpenSSL\lib\VC\x64\MD")) {
            Invoke-Checked "choco install openssl" { choco install openssl -y --no-progress }
          }

          Invoke-Checked "vcpkg install zlib:x64-windows" { vcpkg install zlib:x64-windows }

          echo "OPENSSL_DIR=C:\Program Files\OpenSSL" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\Program Files\OpenSSL\lib\VC\x64\MD" >> $env:GITHUB_ENV

      - name: Decode secrets
        run: ./scripts/decode_secrets.sh
        env:
          PARAMETERS_SECRET: ${{ secrets.PARAMETERS_SECRET }}
        shell: bash

      - name: Build Rust ODBC driver (Linux)
        if: runner.os == 'Linux'
        # Workaround for Rust 1.89+ linker bug with dylib crates (rust-lang/rust#131292)
        run: cargo build
        env:
          RUSTFLAGS: "-C link-arg=-Wl,--undefined-version"

      - name: Build Rust ODBC driver (macOS)
        if: runner.os == 'macOS'
        run: cargo build

      - name: Build Rust ODBC driver (Windows)
        if: runner.os == 'Windows'
        # Use Rust's bundled LLD linker (rust-lld) to avoid MSVC 65535 object limit.
        # exports.def limits DLL exports to ODBC API functions only (avoids 65535 export limit).
        run: cargo build
        env:
          RUSTFLAGS: "-C linker=rust-lld"

      - name: Build and run ODBC tests (Unix)
        if: runner.os != 'Windows'
        id: run_odbc_tests_unix
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        run: |
          ls -l target/debug/
          export DRIVER_PATH=$(pwd)/target/debug/${{ matrix.driver_lib }}
          export PARAMETER_PATH=$(pwd)/parameters.json
          export DRIVER_TYPE=NEW
          ./scripts/odbc/run_tests_unix.sh

      - name: Rerun failed ODBC tests (Unix)
        if: steps.run_odbc_tests_unix.outcome == 'failure' && github.event_name == 'merge_group'
        run: ctest --rerun-failed -C Debug --test-dir odbc_tests/cmake-build --output-on-failure
        env:
          DRIVER_PATH: ${{ github.workspace }}/target/debug/${{ matrix.driver_lib }}
          PARAMETER_PATH: ${{ github.workspace }}/parameters.json
          DRIVER_TYPE: NEW

      - name: Build and run ODBC tests (Windows)
        if: runner.os == 'Windows'
        id: run_odbc_tests_windows
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        shell: pwsh
        run: |
          dir target\debug\
          $env:DRIVER_PATH = "$PWD\target\debug\${{ matrix.driver_lib }}"
          $env:PARAMETER_PATH = "$PWD\parameters.json"
          $env:DRIVER_TYPE = "NEW"
          .\scripts\odbc\run_tests_windows.ps1

      - name: Rerun failed ODBC tests (Windows)
        if: steps.run_odbc_tests_windows.outcome == 'failure' && github.event_name == 'merge_group'
        shell: pwsh
        run: ctest --rerun-failed -C Debug --test-dir odbc_tests/cmake-build --output-on-failure
        env:
          DRIVER_PATH: ${{ github.workspace }}\target\debug\${{ matrix.driver_lib }}
          PARAMETER_PATH: ${{ github.workspace }}\parameters.json
          DRIVER_TYPE: NEW

  odbc-status:
    needs: [detect-changes, odbc_unit_tests, odbc_tests_reference, odbc_tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "=== ODBC CI Status ==="
          
          # Check if tests were skipped
          if [[ "${{ needs.odbc_tests.result }}" == "skipped" ]]; then
            echo "✓ ODBC tests were SKIPPED (no relevant changes detected)"
            echo "  - run_odbc: ${{ needs.detect-changes.outputs.run_odbc }}"
            exit 0
          fi
          
          # Check if any job failed or was cancelled
          if [[ "${{ needs.odbc_unit_tests.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.odbc_tests_reference.result }}" =~ ^(failure|cancelled)$ ]] || \
             [[ "${{ needs.odbc_tests.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "✗ ODBC tests were RUN and FAILED or CANCELLED"
            echo "  - odbc_unit_tests: ${{ needs.odbc_unit_tests.result }}"
            echo "  - odbc_tests_reference: ${{ needs.odbc_tests_reference.result }}"
            echo "  - odbc_tests: ${{ needs.odbc_tests.result }}"
            exit 1
          fi
          
          # Tests ran and passed
          echo "✓ ODBC tests were RUN and PASSED"
          exit 0
