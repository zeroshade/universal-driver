// ====================
// Plugins
// ====================
plugins {
    id 'java-library'
    id 'maven-publish'
    id 'jacoco'
    id 'checkstyle'
    id 'com.diffplug.spotless' version '6.13.0' // latest version supporting Java 8
}

// ====================
// Project metadata
// ====================
def oldJdbcVersion = '4.0.1'
def slf4jVersion = '2.0.9'

group = 'com.snowflake'
version = '0.1.0'
sourceCompatibility = '1.8'
targetCompatibility = '1.8'

// ====================
// Dependency resolution
// ====================
repositories {
    mavenCentral()
}

configurations {
    referenceTestsOldDriver
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:4.6.1'
    testImplementation 'org.json:json:20231013'
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"
    implementation "org.slf4j:slf4j-simple:${slf4jVersion}"
    implementation 'javax.annotation:javax.annotation-api:1.3.2'
    implementation 'org.apache.arrow:arrow-vector:17.0.0'
    implementation 'org.apache.arrow:arrow-memory:17.0.0'
    implementation 'org.apache.arrow:arrow-memory-core:17.0.0'
    implementation 'org.apache.arrow:arrow-memory-netty:17.0.0'
    implementation 'org.apache.arrow:arrow-c-data:17.0.0'
    implementation 'com.google.protobuf:protobuf-java:4.32.1'

    referenceTestsOldDriver "net.snowflake:snowflake-jdbc:${oldJdbcVersion}"
    // Old JDBC reference run needs SLF4J at runtime, but it is not guaranteed by old artifact metadata.
    referenceTestsOldDriver "org.slf4j:slf4j-api:${slf4jVersion}"
    referenceTestsOldDriver "org.slf4j:slf4j-simple:${slf4jVersion}"
}

// ====================
// Code quality tooling
// ====================
spotless {
    java {
        removeUnusedImports()
        googleJavaFormat('1.15.0')
        target 'src/main/java/**/*.java', 'src/test/java/**/*.java'
        targetExclude 'src/**/protobuf_gen/**/*.java'
    }
}

checkstyle {
    toolVersion = '10.12.4'
    configFile = file('config/checkstyle/checkstyle.xml')
}

tasks.withType(Checkstyle).configureEach {
    // Don't check generated sources
    exclude '**/protobuf_gen/**'
    reports {
        xml.required = true
        html.required = true
    }
}

jacoco {
    toolVersion = "0.8.12"
}

// ====================
// Packaging and publishing
// ====================
jar {
    manifest {
        attributes(
            'Implementation-Title': 'Snowflake JDBC Driver',
            'Implementation-Version': project.version,
            'Implementation-Vendor': 'Snowflake Inc.',
            'Main-Class': 'com.snowflake.jdbc.SnowflakeDriver'
        )
    }
}

def copyNativeLib = tasks.register('copyNativeLib', Copy) {
    from '../target/release'
    include 'libjdbc.*'
    into 'build/resources/main'
}

tasks.named('processResources') {
    dependsOn(copyNativeLib)
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java

            pom {
                name = 'Snowflake JDBC Driver'
                description = 'JDBC driver for Snowflake database'
                url = 'https://github.com/snowflake/universal-driver'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }

                developers {
                    developer {
                        id = 'snowflake'
                        name = 'Snowflake Inc.'
                        email = 'support@snowflake.com'
                    }
                }
            }
        }
    }
}

// ====================
// Test tasks
// ====================
def configureCommonTestTask = { t ->
    t.useJUnitPlatform()

    if (JavaVersion.current().isJava9Compatible()) {
        t.jvmArgs '--add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED'
    }
    if (JavaVersion.current().isCompatibleWith(JavaVersion.VERSION_19)) {
        t.jvmArgs '--enable-native-access=ALL-UNNAMED'
    }

    t.outputs.upToDateWhen { false }
    t.testLogging {
        showStandardStreams = true
        showExceptions true
        showCauses true
        showStackTraces true
    }
    t.afterTest { desc, result ->
        println "TEST ${desc.className}.${desc.name}: ${result.resultType}"
    }

    def libPath = file('../target/debug').exists() ? '../target/debug' : '../target/release'
    def libName = System.getProperty('os.name').toLowerCase().contains('mac') ? 'libjdbc_bridge.dylib' :
                  System.getProperty('os.name').toLowerCase().contains('windows') ? 'jdbc_bridge.dll' :
                  'libjdbc_bridge.so'
    t.environment 'CORE_PATH', file("${libPath}/${libName}").absolutePath
    t.environment 'PARAMETER_PATH', file('../parameters.json').absolutePath

    if (System.getProperty('os.name').toLowerCase().contains('mac')) {
        def awsLcPath = fileTree(dir: '../target/debug/build', include: '**/libaws_lc_fips_0_13_8_*.dylib').files.first()?.parentFile?.absolutePath
        if (awsLcPath != null) {
            t.environment 'DYLD_LIBRARY_PATH', "${awsLcPath}:${libPath}"
        }
    }
}

test {
    configureCommonTestTask(delegate)
}

tasks.register('referenceTest', Test) {
    configureCommonTestTask(delegate)
    testClassesDirs = sourceSets.test.output.classesDirs
    include 'net/snowflake/client/api/**'
    // Isolate old-driver reference tests from this module's main runtime deps.
    // Keep only test output/resources + test-only runtime deps + old JDBC driver deps.
    classpath = sourceSets.test.output +
            (sourceSets.test.runtimeClasspath - sourceSets.main.runtimeClasspath) +
            configurations.referenceTestsOldDriver
    shouldRunAfter test
    finalizedBy 'jacocoReferenceReport'
    jacoco {
        destinationFile = layout.buildDirectory.file('jacoco/referenceTest.exec').get().asFile
    }

    reports {
        junitXml.required = true
        html.required = true
    }
}

jacocoTestReport {
    executionData(layout.buildDirectory.file('jacoco/test.exec'))
    reports {
        xml.required = true
        // Keep default-compatible filename for existing CI upload patterns.
        xml.outputLocation = file("${layout.buildDirectory.asFile.get()}/reports/jacoco/test/jacocoTestReport.xml")
        html.required = true
        html.outputLocation = file("${layout.buildDirectory.asFile.get()}/reports/jacoco/test/html")
        csv.required = false
    }

    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/protobuf_gen/**'
            ])
        }))
    }
}

tasks.register('jacocoReferenceReport', JacocoReport) {
    executionData(layout.buildDirectory.file('jacoco/referenceTest.exec'))
    sourceDirectories.setFrom(files())
    classDirectories.setFrom(files(configurations.referenceTestsOldDriver.collect { oldJar ->
        zipTree(oldJar).matching {
            include 'net/snowflake/client/**'
            exclude 'net/snowflake/client/jdbc/internal/**' // shaded dependencies
        }
    }))

    reports {
        xml.required = true
        xml.outputLocation = file("${layout.buildDirectory.asFile.get()}/reports/jacoco/referenceTest/coverage.xml")
        html.required = true
        html.outputLocation = file("${layout.buildDirectory.asFile.get()}/reports/jacoco/referenceTest/html")
        csv.required = false
    }
}
